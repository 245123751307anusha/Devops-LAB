<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voter ID Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: yellow;
        }

        .voter-card {
            width: 380px;
            background-color: yellow;
            border: 2px solid #000;
            padding: 15px;
            margin: 50px auto;
        }

        .header {
            text-align: center;
            font-weight: bold;
        }

        .header h2 {
            margin: 5px 0;
        }

        .details p {
            margin: 6px 0;
            font-size: 14px;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="voter-card">
    <div class="header">
        <h2>Election Commission of India</h2>
        <h3>Voter Identity Card</h3>
    </div>

    <div class="details">
        <p><strong>Name:</strong> Anusha</p>
        <p><strong>Father's Name:</strong> ramanjaneyulu</p>
        <p><strong>Gender:</strong> female</p>
        <p><strong>Date of Birth:</strong> 10/8/2004</p>
        <p><strong>Voter ID No:</strong> XYZ1234567</p>
        <p><strong>Address:</strong> New Delhi, India</p>
    </div>

    <div class="footer">
        <p>This card is issued by the Election Commission of India</p>
    </div>
</div>

</body>
</html>
